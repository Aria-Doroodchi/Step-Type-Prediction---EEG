# P08 — preprocessing override
# Source: bad_interpolated/P08/P08_CNV.py
# Original script cropped raw to two windows (72–135s and 215–1100s) and
# concatenated them — manual surgery that's preserved here.

raw_assembly:
  files:
    - { path: "P08/P08_CNV.bdf", tmin: 72.0,  tmax: 135.0  }
    - { path: "P08/P08_CNV.bdf", tmin: 215.0, tmax: 1100.0 }

bads_extra: [P10, P9, F3, F1, C2, FC2]

preprocessing:
  filter:
    bandpass: [0.2, 40]

