# =====================================================================
# Smoke-test config — runs the full pipeline end-to-end in seconds.
# Layered on top of configs/default.yaml; only the values listed here
# are overridden. Use it via:
#
#     make smoke
#     python run.py --config configs/smoke.yaml --model logistic
#     python -m pytest tests/test_smoke_pipeline.py
#
# Goals: every stage executes, every module is exercised, but nothing
# heavy (LORETA, GridSearch, RFECV, SHAP) actually runs at full size.
# =====================================================================

# Use the smoke preprocessing profile (skips PyPREP, smaller ICA,
# threshold rejection). See configs/preprocessing/smoke.yaml.
preprocessing_profile: smoke

# Single participant only.
participants: [P25]

# Tiny TFR / band setup so PSD computes in a few seconds.
features:
  bin_n: 0.5
  min_time: 0.0
  max_time: 2.0
  freqs:
    fmin: 4.0
    fmax: 12.0
    fstep: 4.0
  freq_bands:
    Theta: [4.0,  8.0]
    Alpha: [8.0, 13.0]
  blocks: [amplitude, slopes, psd]

# Strip LORETA: cache_forward off; coarser binning if it does run.
source_localization:
  bin_n: 0.5
  cache_forward: false

# Compact the modeling stack: small grids, single RFECV iter, no SHAP.
modeling:
  test_size: 0.30
  random_state: 1
  correlation_threshold: 0.95
  k_best: 50
  rfecv:
    n_iterations: 1
    step: 0.2
    min_features_to_select: 20
    scoring: "roc_auc"
  gain_prune:
    mode: "zero"
  shap_prune_quantile: 0.0
  inner_cv_splits: 2

  logistic:
    param_grid:
      C: [0.1, 1.0]

  xgb:
    n_estimators: 50
    n_jobs: 2
    param_grid:
      max_depth: [2]
      learning_rate: [0.1]
      subsample: [1.0]
      colsample_bytree: [1.0]

  svm:
    param_grid:
      C: [1.0]
      kernel: [linear]

logging:
  level: INFO
  stamp_runs: false
