# =====================================================================
# Default configuration for the EEG Step-Type Prediction pipeline.
#
# Layered config (right-hand wins, see src/eeg_steptype/config.py):
#   configs/preprocessing/<profile>.yaml ← THIS file ← local.yaml ← overrides/Pxx.yaml
#
# - Per-machine overrides go in `configs/local.yaml` (gitignored).
# - Per-participant overrides go in `configs/overrides/Pxx.yaml`.
# - Preprocessing knobs live in their own profile file under
#   `configs/preprocessing/<profile>.yaml` so you can A/B different
#   preprocessing recipes against the same models reproducibly.
# =====================================================================

# ---------------------------------------------------------------------
# Paths. Override `paths.raw_root` in configs/local.yaml for your machine.
# ---------------------------------------------------------------------
paths:
  raw_root: "C:/Users/Aria/OneDrive - The University of Western Ontario/MSc/Thesis/Data/Participants"
  data_dir: "data"
  outputs_dir: "outputs"
  bdf_subdir: ""
  epochs_subdir: "bad_interpolated/Epochs/CNV"

# ---------------------------------------------------------------------
# Cohort
# ---------------------------------------------------------------------
participants:
  - P01
  - P02
  - P03
  - P05
  - P06
  - P07
  - P08
  - P10
  - P11
  - P12
  - P13
  - P14
  - P15
  - P16
  - P18
  - P19
  - P21
  - P23
  - P24
  - P25
  - P26
  - P27
  - P28
  - P29
  - P30
  - P31
  - P33
  - P35
  - P37
  - P39

conditions: [One, Two]

events:
  one: 256
  two: 512
  response: 96

# ---------------------------------------------------------------------
# Preprocessing — the full preprocessing spec (filters, ICA, rejection,
# epoching) lives in configs/preprocessing/<profile>.yaml. Switch
# profiles by changing this name; see configs/preprocessing/README.md.
# ---------------------------------------------------------------------
preprocessing_profile: default

# ---------------------------------------------------------------------
# Source localization
# ---------------------------------------------------------------------
source_localization:
  src_file:   "fsaverage-src.fif"
  bem_file:   "fsaverage-bem-sol.fif"
  trans_file: "fsaverage-trans.fif"
  parcellation: "aparc.a2009s"
  method: "eLORETA"
  snr: 2.0
  bin_n: 0.125
  min_time: 0.0
  cache_forward: true

# ---------------------------------------------------------------------
# Feature extraction
# ---------------------------------------------------------------------
features:
  bin_n: 0.125
  min_time: 0.0
  max_time: 2.0
  freqs:
    fmin: 0.5
    fmax: 40.0
    fstep: 0.5
  freq_bands:
    Delta: [0.5,  4.0]
    Theta: [4.0,  8.0]
    Alpha: [8.0, 13.0]
    Beta:  [13.0, 30.0]
    Gamma: [30.0, 40.0]
  blocks: [amplitude, slopes, psd, src]

# ---------------------------------------------------------------------
# Modeling
# ---------------------------------------------------------------------
modeling:
  test_size: 0.30
  random_state: 1
  correlation_threshold: 0.9
  k_best: 500
  rfecv:
    n_iterations: 5
    step: 0.05
    min_features_to_select: 200
    scoring: "roc_auc"
  gain_prune:
    mode: "zero"
    percentile: 10
    absolute: 0.001
  shap_prune_quantile: 0.20

  xgb:
    n_estimators: 1000
    objective: "binary:logistic"
    eval_metric: "logloss"
    tree_method: "hist"
    n_jobs: 16
    param_grid:
      max_depth:         [2, 4, 8, 16]
      min_child_weight:  [1]
      reg_alpha:         [0, 0.1, 0.5]
      gamma:             [0, 0.1, 0.3, 0.5, 1, 2]
      reg_lambda:        [1, 3, 5, 10]
      colsample_bytree:  [0.6, 0.7]
      colsample_bylevel: [0.6, 0.8]
      learning_rate:     [0.01, 0.03, 0.05]
      subsample:         [0.6, 0.8, 1.0]

  svm:
    param_grid:
      C:      [0.1, 1.0, 10.0, 100.0]
      gamma:  [scale, auto, 0.001, 0.01, 0.1, 1.0]
      kernel: [rbf, linear, poly]
      degree: [2, 3, 4]

  lstm:
    epochs: 50
    batch_size: 32
    units_grid:    [32, 64, 128]
    dropout_grid:  [0.2, 0.4]

# ---------------------------------------------------------------------
# Logging / reproducibility
# ---------------------------------------------------------------------
logging:
  level: INFO
  stamp_runs: true
